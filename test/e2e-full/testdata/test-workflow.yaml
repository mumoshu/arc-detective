name: arc-detective-e2e-test
on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Test run identifier'
        required: true
jobs:
  oom-target:
    runs-on: %RUNNER_LABEL%
    steps:
      - name: Trigger OOM
        run: |
          echo "Test run: ${{ github.event.inputs.run_id }}"
          echo "Allocating memory to trigger OOM..."
          # Allocate real RSS memory exceeding the 256Mi cgroup limit.
          # Use a bash array to hold large strings in memory.
          # Each iteration adds ~1MB of resident memory.
          declare -a mem
          i=0
          while true; do
            mem[$i]=$(head -c 1048576 /dev/urandom | base64)
            i=$((i + 1))
          done
