# This rule is not used by the project arc-detective itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the detective.arcdetective.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: arc-detective
    app.kubernetes.io/managed-by: kustomize
  name: detectiveconfig-editor-role
rules:
- apiGroups:
  - detective.arcdetective.io
  resources:
  - detectiveconfigs
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - detective.arcdetective.io
  resources:
  - detectiveconfigs/status
  verbs:
  - get
