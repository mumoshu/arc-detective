---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - ""
  resources:
  - pods/log
  - secrets
  verbs:
  - get
- apiGroups:
  - actions.github.com
  resources:
  - ephemeralrunners
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - detective.arcdetective.io
  resources:
  - detectiveconfigs
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - detective.arcdetective.io
  resources:
  - investigations
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - detective.arcdetective.io
  resources:
  - investigations/status
  verbs:
  - get
  - patch
  - update
