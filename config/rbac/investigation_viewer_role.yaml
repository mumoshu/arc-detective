# This rule is not used by the project arc-detective itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to detective.arcdetective.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: arc-detective
    app.kubernetes.io/managed-by: kustomize
  name: investigation-viewer-role
rules:
- apiGroups:
  - detective.arcdetective.io
  resources:
  - investigations
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - detective.arcdetective.io
  resources:
  - investigations/status
  verbs:
  - get
