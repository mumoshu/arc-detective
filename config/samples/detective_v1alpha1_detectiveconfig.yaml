apiVersion: detective.arcdetective.io/v1alpha1
kind: DetectiveConfig
metadata:
  name: detective-config
spec:
  repositories:
    - owner: myorg
      name: myrepo
  githubAuth:
    type: pat
    secretName: github-credentials
  pollInterval: 30s
  logStorage:
    pvcName: arc-detective-logs
    maxSizeMB: 1024
  retentionPeriod: 168h
